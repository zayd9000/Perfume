<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fragrance Truth | @zayd90000</title>
    <style>
        :root {
            --bg-color: #f4f1ea; 
            --accent: #1a1a1a;
            --danger: #d9534f;
            --muted: #666;
            --card-bg: #ffffff;
            --border-color: #e8e4d9;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            transition: all 0.3s ease;
        }

        header { 
            text-align: center; 
            margin-bottom: 20px; 
            border-bottom: 2px solid var(--accent); 
            padding-bottom: 15px; 
            width: 100%; 
            max-width: 500px; 
        }

        h1 { font-size: 1.3rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; font-weight: bold; }
        .handle { font-size: 1.1rem; letter-spacing: 4px; margin-top: 8px; font-weight: bold; }

        /* Language Toggle with Kurdish Flag Style */
        .lang-switch { 
            margin-bottom: 15px; cursor: pointer; font-size: 0.85rem; 
            border: 2px solid #000; padding: 10px 20px; background: #fff; 
            font-weight: bold; display: flex; align-items: center; gap: 10px;
            box-shadow: 4px 4px 0px #000;
        }
        .flag-icon { width: 24px; height: auto; }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        label { display: block; margin-top: 25px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1.5px; }
        
        input, select {
            width: 100%; padding: 12px; border: 1px solid #ddd; margin-bottom: 5px;
            font-family: inherit; background: #fafafa; box-sizing: border-box; outline: none;
        }

        .char-count { font-size: 0.65rem; color: var(--muted); margin-bottom: 15px; text-align: right; display: block; }

        button {
            width: 100%; padding: 15px; background: var(--accent); color: white; border: none;
            cursor: pointer; text-transform: uppercase; font-weight: bold; letter-spacing: 2px;
            margin-bottom: 10px; transition: 0.2s;
        }

        button:hover { opacity: 0.8; }

        .result-box {
            margin-top: 15px; padding: 20px; border: 1px solid #eee; display: none;
            font-size: 0.85rem; line-height: 1.6; background: #fff; text-align: left;
        }

        .vibe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .vibe-btn { background: #666; font-size: 0.7rem; padding: 12px; }

        .upload-area { border: 2px dashed #ccc; padding: 25px; text-align: center; margin-bottom: 20px; cursor: pointer; color: var(--muted); font-size: 0.8rem; }
        #imagePreview { max-width: 100%; height: auto; border: 8px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 10px; }

        .collection-item { background: #fdfdfd; padding: 12px; margin-bottom: 8px; border-left: 4px solid #000; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; }
        .del-btn { color: var(--danger); cursor: pointer; font-weight: bold; padding: 5px; }

        .tip-box { background: #fdfdfd; padding: 15px; border: 1px solid #eee; font-size: 0.75rem; margin-top: 20px; line-height: 1.5; text-align: left; }
        .fact-check { background: #fff9f9; padding: 15px; border-left: 4px solid var(--danger); font-size: 0.75rem; margin-top: 20px; text-align: left; }

        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
        
        body.rtl .result-box, body.rtl .tip-box, body.rtl .fact-check, body.rtl .collection-item { text-align: right; }
        body.rtl .collection-item { border-left: 0; border-right: 4px solid #000; }
        body.rtl .char-count { text-align: left; }
    </style>
</head>
<body>

    <button class="lang-switch" onclick="toggleLang()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d2/Flag_of_Kurdistan.svg" class="flag-icon" alt="Kurdistan">
        <span id="lang-text">Switch to Kurdish (Sorani)</span>
    </button>

    <header>
        <h1 id="main-title">THE FRAGRANCE TRUTH</h1>
        <div class="handle">@zayd90000</div>
    </header>

    <div class="container">
        <a class="weatherwidget-io" href="https://forecast7.com/en/36d1944d01/erbil/" data-label_1="ERBIL" data-label_2="LIVE WEATHER" data-theme="pure">ERBIL LIVE WEATHER</a>

        <hr>

        <label id="lbl-verify">Verification Lab (Batch Checker)</label>
        <input type="text" id="barcodeInput" maxlength="12" placeholder="Batch Code (e.g. 38YN908)" oninput="updateCharCount()">
        <span class="char-count" id="countDisplay">0 / 8-10 characters recommended</span>
        <button id="btn-verify" onclick="checkTruth()">Analyze Authenticity</button>
        <div id="result" class="result-box"></div>

        <label id="lbl-visual">Visual Evidence</label>
        <div class="upload-area" id="up-area" onclick="document.getElementById('imageInput').click()">[+] Upload Bottle or Box Photo</div>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="previewImage(event)">
        <div id="preview-container" style="display:none; text-align:center;"><img id="imagePreview" src="#"></div>

        <hr>

        <label id="lbl-math">Fragrance Math (Value Checker)</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="perfPrice" placeholder="Price ($)">
            <input type="number" id="perfSize" placeholder="Size (ml)">
        </div>
        <button id="btn-math" onclick="calculateValue()">Calculate Cost per ML</button>
        <div id="math-result" class="result-box"></div>

        <hr>

        <label id="lbl-search">Search Perfume Data (2026)</label>
        <input type="text" id="scentSearch" placeholder="Search (Dior, Creed, Lattafa...)" onkeyup="if(event.key==='Enter')searchScent()">
        <button id="btn-search" onclick="searchScent()">Search Database</button>
        <div id="guide-result" class="result-box"></div>

        <hr>

        <label id="lbl-vibe">Shop By Vibe</label>
        <div class="vibe-grid">
            <button class="vibe-btn" onclick="getVibe('Work')">Work</button>
            <button class="vibe-btn" onclick="getVibe('Date')">Date</button>
            <button class="vibe-btn" onclick="getVibe('Gym')">Gym</button>
            <button class="vibe-btn" onclick="getVibe('Wedding')">Wedding</button>
        </div>
        <div id="vibe-result" class="result-box"></div>

        <hr>

        <label id="lbl-coll">My Collection (Scent Shelf)</label>
        <div id="collection-list"></div>

        <div class="tip-box" id="climate-warn">
            <strong>ERBIL CLIMATE WARNING:</strong><br>
            Direct heat destroys perfume. Never store bottles in vehicles.
        </div>

        <div class="fact-check" id="perf-truth">
            <strong>PERFORMANCE TRUTH:</strong><br>
            • EDT: 3-5h | EDP: 6-9h | Parfum: 10h+
        </div>

        <div style="font-size: 0.6rem; color: #aaa; text-align: center; margin-top: 25px; text-transform: uppercase;">
            Verified April 2026 Retail Data
        </div>
    </div>

    <script>
        let currentLang = 'en';
        const knownScams = ["38YN908", "562112", "10L11CJ", "22U11CR", "62X301V"];
        
        const scentDB = [
            { name: "Sauvage Elixir", brand: "Dior", price: "$199", risk: "Low", vibe: "Date" },
            { name: "Aventus", brand: "Creed", price: "$495", risk: "Medium", vibe: "Wedding" },
            { name: "Baccarat Rouge 540", brand: "MFK", price: "$325", risk: "High", vibe: "Wedding" },
            { name: "Layton", brand: "Parfums de Marly", price: "$350", risk: "Medium", vibe: "Date" },
            { name: "Khamrah Qahwa", brand: "Lattafa", price: "$45", risk: "Low", vibe: "Date" },
            { name: "Myslf", brand: "YSL", price: "$150", risk: "Low", vibe: "Work" },
            { name: "Light Blue", brand: "D&G", price: "$120", risk: "Low", vibe: "Gym" }
        ];

        const translations = {
            en: {
                title: "THE FRAGRANCE TRUTH",
                verify: "Verification Lab (Batch Checker)",
                analyze: "Analyze Authenticity",
                visual: "Visual Evidence",
                upload: "[+] Upload Bottle or Box Photo",
                math: "Fragrance Math (Value Checker)",
                calc: "Calculate Cost per ML",
                search: "Search Perfume Data (2026)",
                btnSearch: "Search Database",
                vibe: "Shop By Vibe",
                coll: "My Collection (Scent Shelf)",
                warn: "<strong>ERBIL CLIMATE WARNING:</strong><br>Direct heat destroys perfume. Never store bottles in vehicles.",
                perf: "<strong>PERFORMANCE TRUTH:</strong><br>• EDT: 3-5h | EDP: 6-9h | Parfum: 10h+",
                fake: "■ STATUS: 100% FAKE. Known clone code.",
                real: "■ STATUS: FORMAT VALID.",
                switch: "Switch to Kurdish (Sorani)",
                mathRes: "Result: "
            },
            ku: {
                title: "ڕاستی عەترەکان",
                verify: "تاقیگەی دڵنیایی (پشکنینی کۆد)",
                analyze: "پشکنین بکە",
                visual: "بەڵگەی بینراو",
                upload: "[+] وێنەی بوتڵەکە دابنێ",
                math: "حیساباتی عەتر (نرخی مل)",
                calc: "حیسابی بکە",
                search: "گەڕان بۆ زانیاری عەتر (٢٠٢٦)",
                btnSearch: "بگەڕێ",
                vibe: "بەپێی مۆد و ستایل",
                coll: "کۆکراوەی من (ڕەفە)",
                warn: "<strong>ئاگاداری بۆ کەشوهەوای هەولێر:</strong><br>گەرمای زۆر عەتر تێکدەدات. هەرگیز لەناو سەیارە دایمەنێ.",
                perf: "<strong>ڕاستی مانەوەی بۆن:</strong><br>• EDT: ٣-٥ سەعات | EDP: ٦-٩ سەعات | Parfum: ١٠ سەعات+",
                fake: "■ دۆخەکە: ١٠٠٪ فەیکە. ئەم کۆدە کۆپییە.",
                real: "■ دۆخەکە: کۆدەکە دروستە.",
                switch: "گۆڕین بۆ ئینگلیزی",
                mathRes: "ئەنجام: "
            }
        };

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ku' : 'en';
            const t = translations[currentLang];
            document.getElementById('main-title').innerText = t.title;
            document.getElementById('lbl-verify').innerText = t.verify;
            document.getElementById('btn-verify').innerText = t.analyze;
            document.getElementById('lbl-visual').innerText = t.visual;
            document.getElementById('up-area').innerText = t.upload;
            document.getElementById('lbl-math').innerText = t.math;
            document.getElementById('btn-math').innerText = t.calc;
            document.getElementById('lbl-search').innerText = t.search;
            document.getElementById('btn-search').innerText = t.btnSearch;
            document.getElementById('lbl-vibe').innerText = t.vibe;
            document.getElementById('lbl-coll').innerText = t.coll;
            document.getElementById('climate-warn').innerHTML = t.warn;
            document.getElementById('perf-truth').innerHTML = t.perf;
            document.getElementById('lang-text').innerText = t.switch;
            
            document.body.classList.toggle('rtl', currentLang === 'ku');
            document.body.style.direction = currentLang === 'ku' ? 'rtl' : 'ltr';
            updateCharCount();
        }

        function updateCharCount() {
            const input = document.getElementById('barcodeInput').value;
            const suffix = currentLang === 'ku' ? " پیت نووسراوە" : " characters";
            document.getElementById('countDisplay').innerText = `${input.length} / 8-10 ${suffix}`;
        }

        function calculateValue() {
            const p = document.getElementById('perfPrice').value;
            const s = document.getElementById('perfSize').value;
            const r = document.getElementById('math-result');
            if (p > 0 && s > 0) {
                r.style.display = "block";
                r.innerHTML = `${translations[currentLang].mathRes} <strong>$${(p/s).toFixed(2)} / 1ml</strong>`;
            }
        }

        function checkTruth() {
            const val = document.getElementById('barcodeInput').value.trim().toUpperCase();
            const res = document.getElementById('result');
            res.style.display = "block";
            res.innerHTML = knownScams.includes(val) ? translations[currentLang].fake : translations[currentLang].real;
        }

        function searchScent() {
            const q = document.getElementById('scentSearch').value.toLowerCase().trim();
            const res = document.getElementById('guide-result');
            if (!q) return;
            res.style.display = "block";
            res.innerHTML = "";
            const filtered = scentDB.filter(s => s.name.toLowerCase().includes(q) || s.brand.toLowerCase().includes(q));
            
            if (filtered.length > 0) {
                filtered.forEach(s => {
                    res.innerHTML += `<div class="item-card"><strong>${s.brand}: ${s.name}</strong><br><span class="price-tag">${s.price}</span> | Risk: ${s.risk}<br><button class="coll-btn" onclick="addToCollection('${s.name}')">+ Add to Shelf</button></div>`;
                });
            } else { res.innerHTML = currentLang === 'ku' ? "نەدۆزرایەوە" : "Not found."; }
        }

        function getVibe(v) {
            const res = document.getElementById('vibe-result');
            res.style.display = "block";
            res.innerHTML = "";
            const filtered = scentDB.filter(s => s.vibe === v);
            filtered.forEach(s => { res.innerHTML += `• ${s.brand} ${s.name}<br>`; });
        }

        function addToCollection(name) {
            let coll = JSON.parse(localStorage.getItem('myColl') || "[]");
            if (!coll.includes(name)) coll.push(name);
            localStorage.setItem('myColl', JSON.stringify(coll));
            showCollection();
        }

        function showCollection() {
            const list = document.getElementById('collection-list');
            const coll = JSON.parse(localStorage.getItem('myColl') || "[]");
            list.innerHTML = coll.map(i => `<div class="collection-item"><span>${i}</span><span class="del-btn" onclick="removeFromColl('${i}')">X</span></div>`).join('');
        }

        function removeFromColl(name) {
            let coll = JSON.parse(localStorage.getItem('myColl') || "[]");
            coll = coll.filter(i => i !== name);
            localStorage.setItem('myColl', JSON.stringify(coll));
            showCollection();
        }

        function previewImage(e) {
            const r = new FileReader();
            r.onload = () => { document.getElementById('imagePreview').src = r.result; document.getElementById('preview-container').style.display='block'; };
            r.readAsDataURL(e.target.files[0]);
        }

        window.onload = showCollection;
    </script>
    <script>!function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');</script>
</body>
</html>
