<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fragrance Truth | @zayd90000</title>
    <style>
        /* Minimalist & Cinematic "Paper" Aesthetic */
        :root {
            --bg-color: #f4f1ea; 
            --accent: #1a1a1a;
            --danger: #d9534f;
            --muted: #666;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            font-weight: bold;
        }

        .handle {
            font-size: 1rem;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-top: 10px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            padding: 35px;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.03);
            border: 1px solid #e8e4d9;
            box-sizing: border-box;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-family: inherit;
            font-size: 1rem;
            background: #fafafa;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
            letter-spacing: 3px;
        }

        .result-box {
            margin-top: 20px;
            padding: 20px;
            border: 1px dashed #ccc;
            display: none;
            font-size: 0.95rem;
            background: #fdfdfd;
        }

        .warning { color: var(--danger); font-weight: bold; border-color: var(--danger) !important; }
        .success { color: #2e7d32; font-weight: bold; }

        .perf-tag {
            display: inline-block;
            background: #eee;
            padding: 4px 10px;
            font-size: 0.75rem;
            margin: 5px 5px 0 0;
            text-transform: uppercase;
        }

        hr { border: 0; border-top: 1px solid #eee; margin: 40px 0; }

        .checklist-item {
            margin-bottom: 12px;
            padding-left: 20px;
            position: relative;
        }

        .checklist-item::before {
            content: "×";
            position: absolute;
            left: 0;
            color: var(--danger);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>We all deserve to know the truth</h1>
        <div class="handle">@zayd90000</div>
    </header>

    <div class="container">
        <label>Step 1: The Batch Analysis</label>
        <input type="text" id="barcodeInput" placeholder="Enter Batch Code (e.g. 38YN908)">
        <button onclick="checkBatch()">Scan Database</button>
        <div id="batchResult" class="result-box"></div>

        <hr>

        <label>Step 2: Physical Red Flags</label>
        <select id="brandSelect" onchange="showHardwareCheck()">
            <option value="">Select Brand for Hardware Check...</option>
            <option value="armani">Armani</option>
            <option value="ysl">YSL (Yves Saint Laurent)</option>
            <option value="dior">Dior</option>
            <option value="jpg">Jean Paul Gaultier</option>
            <option value="margiela">Maison Margiela</option>
        </select>
        <div id="hardwareResult" class="result-box"></div>

        <hr>

        <label>Step 3: Performance & Notes</label>
        <input type="text" id="scentSearch" placeholder="Search Fragrance Name...">
        <button onclick="searchScent()">Check Performance</button>
        <div id="guideResult" class="result-box"></div>
    </div>

    <script>
        // DATA: FAKE CODES
        const knownFakeCodes = ["38YN908", "562112"];

        // DATA: HARDWARE RED FLAGS
        const hardwareData = {
            "armani": [
                "Real bottles of SWY Intensely have BLANK sprayers. Fakes often have an eagle logo.",
                "The cap should be heavy metal. If it feels like light plastic, it's a clone.",
                "Check the text spacing on the bottom of the bottle. Fakes are often crowded."
            ],
            "ysl": [
                "The 'Dip Tube' (straw) must be nearly invisible. Thick white tubes are 100% fake.",
                "Glass base must be crystal clear. 'Wavy' or uneven glass is a sign of cheap manufacturing.",
                "YSL MYSLF fakes often have messy plastic collars under the atomizer."
            ],
            "dior": [
                "Sauvage caps MUST be magnetic and align the bee/text automatically.",
                "The atomizer 'eye' should be black and perfectly centered.",
                "Check the 'CD' etching on the sprayer. Fakes are shallow and messy."
            ],
            "jpg": [
                "The batch code must be laser-etched into the metal tin, not a paper sticker.",
                "The gold finish on Elixir should be deep honey-gold, not bright yellow plastic.",
                "The safety pin should feel sturdy and polished, not like cheap wire."
            ],
            "margiela": [
                "The label is made of cotton fabric. If it feels like paper or plastic, it is fake.",
                "The 'REPLICA' text on the bottle should be perfectly crisp and slightly raised.",
                "Generic barcode 562112 is a confirmed mass-market counterfeit."
            ]
        };

        // DATA: PERFORMANCE GUIDE
        const scentDB = {
            "sauvage elixir": { season: "Winter/Fall", time: "Night", notes: "Cinnamon, Lavender, Licorice", vibe: "Bold/Powerful" },
            "stronger with you": { season: "Winter/Autumn", time: "Evening", notes: "Chestnut, Vanilla, Sage", vibe: "Sweet/Cozy" },
            "myslf": { season: "Spring/Summer", time: "Day", notes: "Orange Blossom, Ambroxan", vibe: "Clean/Modern" },
            "libre": { season: "All Seasons", time: "Day to Night", notes: "Lavender, Jasmine, Musk", vibe: "Elegant/Floral" },
            "by the fireplace": { season: "Winter", time: "Night", notes: "Clove, Chestnut, Vanilla", vibe: "Smoky/Warm" },
            "le male elixir": { season: "Winter", notes: "Honey, Tobacco, Lavender", vibe: "Rich/Sweet" }
        };

        function checkBatch() {
            const val = document.getElementById('barcodeInput').value.trim().toUpperCase();
            const res = document.getElementById('batchResult');
            res.style.display = "block";
            res.classList.remove('warning');

            if (knownFakeCodes.includes(val)) {
                res.classList.add('warning');
                res.innerHTML = "■ ANALYSIS: COUNTERFEIT DETECTED.<br>This code is a known 'Template' used on fakes across different brands. Do not apply to skin.";
            } else if (val === "") {
                res.innerHTML = "Please enter a code.";
            } else {
                res.innerHTML = "<span class='success'>■ ANALYSIS: FORMAT VALID.</span><br>Code exists in global lists. Now proceed to Step 2 to verify the bottle hardware.";
            }
        }

        function showHardwareCheck() {
            const brand = document.getElementById('brandSelect').value;
            const res = document.getElementById('hardwareResult');
            if (!brand) { res.style.display = "none"; return; }
            
            res.style.display = "block";
            let html = `<strong>${brand.toUpperCase()} RED FLAGS:</strong><br><br>`;
            hardwareData[brand].forEach(tip => {
                html += `<div class="checklist-item">${tip}</div>`;
            });
            res.innerHTML = html;
        }

        function searchScent() {
            const query = document.getElementById('scentSearch').value.toLowerCase();
            const res = document.getElementById('guideResult');
            res.style.display = "block";

            let found = false;
            for (let name in scentDB) {
                if (query.includes(name) || name.includes(query)) {
                    const d = scentDB[name];
                    res.innerHTML = `<strong>${name.toUpperCase()}</strong><br>` +
                                    `<span class="perf-tag">${d.season}</span>` +
                                    `<span class="perf-tag">${d.time}</span><br><br>` +
                                    `Notes: ${d.notes}<br>Vibe: ${d.vibe}`;
                    found = true;
                    break;
                }
            }
            if (!found) res.innerHTML = "Fragrance not found. Search 'Sauvage' or 'MYSLF'.";
        }
    </script>
</body>
</html>
